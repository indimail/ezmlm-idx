name: ezmlm-idx Ubuntu, Mac OSX CI

on:
  push:
    paths:
      - '**/ezmlm-idx-x/**'
      - .github/workflows/ezmlm-idx-c-cpp.yml
      - '!**/ezmlm-idx-x/debian/*'
      - '!**/ezmlm-idx-x/ezmlm-idx.spec.in'
      - '!**/*.9'
      - '!**/*.8'
      - '!**/*.5'
      - '!**/*.1'
      - '!**/doc/*'
      - '!**.md'
      - '!**/ezmlm-idx-freebsd.yml'
      - '!**/ezmlm-idx-obs.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.host }}-${{ matrix.config.name }}
    runs-on: ${{ matrix.host }}
    strategy:
      fail-fast: false
      matrix:
        host: [ubuntu-latest, macos-latest]
    
    steps:
    - name: extra_packages
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          brew install automake autoconf libtool pkgconfig openssl mysql
        fi
        if [ "${OS}" = "ubuntu-latest" ] ; then
          sudo apt-get install gcc g++ automake autoconf libtool libssl-dev libmysqlclient-dev
        fi
      env:
        OS: ${{ matrix.host }}

    - name: checkout_main
      uses: actions/checkout@v4
      with:
        path: ezmlm-idx
      
    - name: checkout_qmail
      uses: actions/checkout@v4
      with:
        repository: mbhangui/libqmail
        path: libqmail

    - name: install_qmail
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          # Dynamically fetch base paths for Homebrew dependencies
          OPENSSL_PREFIX=$(brew --prefix openssl@3)

          # Combine both paths cleanly into your compilation flags
          export CPPFLAGS="-I${OPENSSL_PREFIX}/include"
          export LDFLAGS="-L${OPENSSL_PREFIX}/lib"
        else
          # Standard flags for Ubuntu environment
          export CPPFLAGS=""
          export LDFLAGS=""
        fi
        cd libqmail
        ./default.configure
        make
        sudo make install-strip
      env:
        OS: ${{ matrix.host }}

    - name: build_ezmlm-idx
      run: |
        if [ "${OS}" = "macos-latest" ] ; then
          # Dynamically fetch base paths for Homebrew dependencies
          OPENSSL_PREFIX=$(brew --prefix openssl@3)

          # Combine both paths cleanly into your compilation flags
          export CPPFLAGS="-I${OPENSSL_PREFIX}/include"
          export LDFLAGS="-L${OPENSSL_PREFIX}/lib"
        else
          # Standard flags for Ubuntu environment
          export CPPFLAGS=""
          export LDFLAGS=""
        fi
        cd ezmlm-idx/ezmlm-idx-x
        ./default.configure
        ./qmake
      env:
        OS: ${{ matrix.host }}
